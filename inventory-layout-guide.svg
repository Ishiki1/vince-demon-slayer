      <rect x="524" y="272" width="40" height="40" class="gridCell"/><rect x="518" y="279" width="40" height="40" class="equipped"/><text x="544" y="292" class="cellNum">18</text>
      <rect x="570" y="272" width="40" height="40" class="gridCell"/><rect x="564" y="279" width="40" height="40" class="equipped"/><text x="590" y="292" class="cellNum">19</text>
      <rect x="616" y="272" width="40" height="40" class="gridCell"/><rect x="610" y="279" width="40" height="40" class="equipped"/><text x="636" y="292" class="cellNum">20</text>
    </g>

    <g>
      <rect x="432" y="318" width="40" height="40" class="gridCell"/><rect x="426" y="325" width="40" height="40" class="equipped"/><text x="452" y="338" class="cellNum">21</text>
