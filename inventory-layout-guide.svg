      <rect x="432" y="180" width="40" height="40" class="gridCell"/><rect x="426" y="187" width="40" height="40" class="equipped"/><text x="452" y="200" class="cellNum">06</text>
      <rect x="478" y="180" width="40" height="40" class="gridCell"/><rect x="472" y="187" width="40" height="40" class="equipped"/><text x="498" y="200" class="cellNum">07</text>
      <rect x="524" y="180" width="40" height="40" class="gridCell"/><rect x="518" y="187" width="40" height="40" class="equipped"/><text x="544" y="200" class="cellNum">08</text>
      <rect x="570" y="180" width="40" height="40" class="gridCell"/><rect x="564" y="187" width="40" height="40" class="equipped"/><text x="590" y="200" class="cellNum">09</text>
