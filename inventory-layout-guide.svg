    </g>

    <g>
      <rect x="432" y="364" width="40" height="40" class="gridCell"/><rect x="426" y="371" width="40" height="40" class="equipped"/><text x="452" y="384" class="cellNum">26</text>
      <rect x="478" y="364" width="40" height="40" class="gridCell"/><rect x="472" y="371" width="40" height="40" class="equipped"/><text x="498" y="384" class="cellNum">27</text>
      <rect x="524" y="364" width="40" height="40" class="gridCell"/><rect x="518" y="371" width="40" height="40" class="equipped"/><text x="544" y="384" class="cellNum">28</text>
      <rect x="570" y="364" width="40" height="40" class="gridCell"/><rect x="564" y="371" width="40" height="40" class="equipped"/><text x="590" y="384" class="cellNum">29</text>
