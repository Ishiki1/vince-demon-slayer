      <rect x="432" y="134" width="40" height="40" class="gridCell"/><rect x="426" y="141" width="40" height="40" class="equipped"/><text x="452" y="154" class="cellNum">01</text>
      <rect x="478" y="134" width="40" height="40" class="gridCell"/><rect x="472" y="141" width="40" height="40" class="equipped"/><text x="498" y="154" class="cellNum">02</text>
      <rect x="524" y="134" width="40" height="40" class="gridCell"/><rect x="518" y="141" width="40" height="40" class="equipped"/><text x="544" y="154" class="cellNum">03</text>
      <rect x="570" y="134" width="40" height="40" class="gridCell"/><rect x="564" y="141" width="40" height="40" class="equipped"/><text x="590" y="154" class="cellNum">04</text>
      <rect x="616" y="134" width="40" height="40" class="gridCell"/><rect x="610" y="141" width="40" height="40" class="equipped"/><text x="636" y="154" class="cellNum">05</text>
    </g>

