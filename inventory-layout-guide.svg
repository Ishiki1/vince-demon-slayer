  <g id="ui-helpers">
    <rect x="657" y="499" width="108" height="42" rx="6" class="closeArea"/>
    <text x="665" y="495" class="label">Close hotspot</text>
    <line x1="82" y1="519" x2="94" y2="519" class="statusMark"/>
    <line x1="88" y1="513" x2="88" y2="525" class="statusMark"/>
    <text x="100" y="523" class="label">Status text anchor 88,519</text>
  </g>

  <text x="16" y="578" class="subtitle">Bag icon footprint uses xOffset -6 and yOffset +7 inside each 40x40 cell. Equipped icons use the current live offsets from code.</text>
</svg>
