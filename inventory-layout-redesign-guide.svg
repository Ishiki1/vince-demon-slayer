<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <pattern id="minorGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#16202f" stroke-width="1"/>
    </pattern>
    <style>
      .title { font: 700 18px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 12px Arial, sans-serif; fill: #cbd5e1; }
      .legend { font: 12px Arial, sans-serif; fill: #e2e8f0; }
      .axis { font: 10px Arial, sans-serif; fill: #64748b; }
      .label { font: 12px Arial, sans-serif; fill: #e5e7eb; }
      .small { font: 10px Arial, sans-serif; fill: #a5b4fc; }
      .micro { font: 9px Arial, sans-serif; fill: #cbd5e1; text-anchor: middle; }
      .cellNum { font: 11px Arial, sans-serif; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .window { fill: rgba(15, 23, 42, 0.84); stroke: #475569; stroke-width: 2; }
      .slot { fill: rgba(59, 130, 246, 0.12); stroke: #60a5fa; stroke-width: 2; }
      .itemFit { fill: rgba(250, 204, 21, 0.18); stroke: #facc15; stroke-width: 2; }
      .cellFit { fill: rgba(250, 204, 21, 0.14); stroke: #facc15; stroke-width: 2; }
      .gridCell { fill: rgba(34, 197, 94, 0.10); stroke: #22c55e; stroke-width: 1.5; }
      .closeArea { fill: rgba(249, 115, 22, 0.22); stroke: #f97316; stroke-width: 2; }
      .centerMark { stroke: #f8fafc; stroke-width: 1.2; opacity: 0.9; }
    </style>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="#08111d"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#minorGrid)"/>

  <text x="16" y="28" class="title">Inventory Layout Redesign Guide</text>
  <text x="16" y="46" class="subtitle">Redesigned 800x600 inventory reference. Printed coordinates are sprite center positions to hardcode.</text>

  <g>
    <text x="8" y="14" class="axis">0</text>
    <text x="98" y="14" class="axis">100</text>
    <text x="198" y="14" class="axis">200</text>
    <text x="298" y="14" class="axis">300</text>
    <text x="398" y="14" class="axis">400</text>
    <text x="498" y="14" class="axis">500</text>
    <text x="598" y="14" class="axis">600</text>
    <text x="698" y="14" class="axis">700</text>
    <text x="2" y="102" class="axis">100</text>
    <text x="2" y="202" class="axis">200</text>
    <text x="2" y="302" class="axis">300</text>
    <text x="2" y="402" class="axis">400</text>
    <text x="2" y="502" class="axis">500</text>
  </g>

  <rect x="88" y="40" width="624" height="520" rx="10" class="window"/>
  <text x="104" y="62" class="label">Inventory frame: x=88 y=40 w=624 h=520</text>

  <g>
    <rect x="484" y="54" width="212" height="58" rx="8" fill="rgba(2, 6, 23, 0.78)" stroke="#334155" stroke-width="1.5"/>
    <rect x="498" y="68" width="14" height="14" class="slot"/>
    <text x="520" y="79" class="legend">Blue = slot bounds</text>
    <rect x="498" y="88" width="14" height="14" class="itemFit"/>
    <text x="520" y="99" class="legend">Gold = sprite footprint</text>
  </g>

